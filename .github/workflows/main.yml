name: Signal Bot Saham IDX v7.0

on:
  schedule:
    - cron: '50 1 * * 1-5'   # 08:50 WIB — Pre-market
    - cron: '30 2 * * 1-5'   # 09:30 WIB — Opening momentum
    - cron: '0 4 * * 1-5'    # 11:00 WIB — Mid-morning
    - cron: '30 6 * * 1-5'   # 13:30 WIB — Post-lunch
    - cron: '30 8 * * 1-5'   # 15:30 WIB — Closing approach

  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan manual run (opsional)'
        required: false
        default: 'Manual trigger'

jobs:
  run-signal-bot:
    name: Run Signal Bot Saham IDX
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Signal Bot
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:         ${{ secrets.CHAT_ID }}
          PORTFOLIO_IDR:   ${{ secrets.PORTFOLIO_IDR }}
          RISK_PCT:        ${{ secrets.RISK_PCT }}
        run: |
          echo "▶️  Starting Signal Bot Saham IDX v7.0"
          echo "⏰  WIB: $(TZ='Asia/Jakarta' date)"
          python bot_saham_v7.py

      - name: Run complete
        if: always()
        run: echo "✅ Selesai — cek Telegram."
