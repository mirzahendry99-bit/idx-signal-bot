name: Signal Bot Saham IDX v2.0

on:
  schedule:
    - cron: '0 2 * * 1-5'   # 09:00 WIB
    - cron: '0 4 * * 1-5'   # 11:00 WIB
    - cron: '0 6 * * 1-5'   # 13:00 WIB
    - cron: '0 8 * * 1-5'   # 15:00 WIB
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance>=0.2.40 supabase>=2.0.0 numpy>=1.26.0

      - name: Run signal bot
        run: python bot_saham_v2.py
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:         ${{ secrets.CHAT_ID }}
